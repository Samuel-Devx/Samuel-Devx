<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#1a0a00"/>
      <stop offset="100%" style="stop-color:#2d1200"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="40" x2="800" y2="40" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="80" y1="0" x2="80" y2="200" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="720" y1="0" x2="720" y2="200" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.1"/>

  <!-- Glow circle -->
  <circle cx="680" cy="100" r="80" fill="#f97316" fill-opacity="0.04"/>
  <circle cx="680" cy="100" r="50" fill="#f97316" fill-opacity="0.05"/>

  <!-- Coffee cup icon (manual SVG) -->
  <g transform="translate(620, 65)" fill="#f97316" fill-opacity="0.9" filter="url(#glow)">
    <rect x="5" y="20" width="40" height="30" rx="3" fill="none" stroke="#f97316" stroke-width="2"/>
    <path d="M45 28 Q58 28 58 38 Q58 48 45 48" fill="none" stroke="#f97316" stroke-width="2"/>
    <rect x="12" y="50" width="26" height="3" rx="1.5" fill="#f97316"/>
    <!-- steam -->
    <path d="M15 16 Q18 10 15 4" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
    <path d="M25 14 Q28 8 25 2" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
    <path d="M35 16 Q38 10 35 4" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
  </g>

  <!-- Window dots -->
  <circle cx="28" cy="28" r="5" fill="#ff5f57"/>
  <circle cx="44" cy="28" r="5" fill="#ffbd2e"/>
  <circle cx="60" cy="28" r="5" fill="#28c940"/>
  <text x="80" y="33" font-family="monospace" font-size="11" fill="#8b949e">SamuelDev.java — IntelliJ IDEA</text>

  <!-- Top border orange line -->
  <rect x="0" y="0" width="800" height="3" fill="url(#orange)" rx="2"/>

  <!-- Main name -->
  <text x="90" y="105" font-family="'Courier New', monospace" font-size="46" font-weight="bold" fill="#ffffff" letter-spacing="-1">Samuel</text>
  <text x="90" y="105" font-family="'Courier New', monospace" font-size="46" font-weight="bold" fill="url(#orange)" letter-spacing="-1" dx="270">Alves</text>

  <!-- Role -->
  <text x="92" y="135" font-family="'Courier New', monospace" font-size="15" fill="#f97316" letter-spacing="3">☕  JAVA BACK-END DEVELOPER</text>

  <!-- Bottom detail -->
  <text x="92" y="170" font-family="'Courier New', monospace" font-size="11" fill="#8b949e">📍 Rio de Janeiro · Eng. Software · Open to Work</text>

  <!-- Bottom border -->
  <rect x="0" y="197" width="800" height="3" fill="url(#orange)" rx="2"/>
</svg>
